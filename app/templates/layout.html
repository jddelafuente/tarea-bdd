<!-- layout  cortesia de gemini :) -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Torneos Esports</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: #1a1a1a; color: white; padding: 20px; }
        .sidebar h2 { border-bottom: 2px solid #e74c3c; padding-bottom: 10px; }
        .sidebar a { display: block; color: #bdc3c7; text-decoration: none; padding: 10px 0; font-size: 18px; }
        .sidebar a:hover { color: #fff; background-color: #34495e; padding-left: 10px; transition: 0.3s; }
        .content { flex: 1; padding: 30px; background-color: #f4f6f7; overflow-y: auto; }
        .caja-blanca { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Panel de Control</h2>
        <a href="/">🛡️ Equipos Inscritos</a>
        <a href="/torneos">🐐 Torneos</a>
        <a href="/estadisticas">📈 Estadisticas de Torneo</a>
        <a href="/buscar">🔍 Busqueda</a>
        <a href="/sponsors">🤑 Sponsors</a> 
        <a href = "/inscribirse">✏️ Inscripciones</a>
        </div>

    <div class="content">
        <div class="caja-blanca">
            {% block contenido %}
            {% endblock %}
        </div>
    </div>

</body>
</html>
